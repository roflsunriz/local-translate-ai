name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify:
    name: Verify (${{ matrix.task }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task:
          - lint
          - type-check
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ${{ matrix.task }}
        run: bun run ${{ matrix.task }}

  package:
    name: Package signed XPI
    runs-on: ubuntu-latest
    needs: verify
    environment: amo
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build extension
        run: bun run build

      - name: Sign extension with AMO
        id: sign
        shell: bash
        run: |
          set +e
          bun run sign:listed 2>&1 | tee amo-sign.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -eq 0 ]; then
            echo "reused=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -Eiq 'version .*already exists|already exists.*version' amo-sign.log; then
            echo "AMO already has this version; reusing the existing signed XPI."
            echo "reused=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          exit "$status"
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}

      - name: Download existing signed XPI from AMO
        if: steps.sign.outputs.reused == 'true'
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { createHmac, randomUUID } from 'node:crypto';
          import { mkdir, readFile, writeFile } from 'node:fs/promises';
          import path from 'node:path';

          const apiKey = process.env.WEB_EXT_API_KEY;
          const apiSecret = process.env.WEB_EXT_API_SECRET;
          if (!apiKey || !apiSecret) {
            throw new Error('WEB_EXT_API_KEY and WEB_EXT_API_SECRET are required.');
          }

          const base64url = (value) => Buffer.from(value)
            .toString('base64')
            .replace(/=/g, '')
            .replace(/\+/g, '-')
            .replace(/\//g, '_');

          const signJwt = () => {
            const issuedAt = Math.floor(Date.now() / 1000);
            const header = { alg: 'HS256', typ: 'JWT' };
            const payload = {
              iss: apiKey,
              jti: randomUUID(),
              iat: issuedAt,
              exp: issuedAt + 60,
            };
            const unsignedToken = `${base64url(JSON.stringify(header))}.${base64url(JSON.stringify(payload))}`;
            const signature = createHmac('sha256', apiSecret).update(unsignedToken).digest('base64url');
            return `${unsignedToken}.${signature}`;
          };

          const manifest = JSON.parse(await readFile('dist/manifest.json', 'utf8'));
          const packageJson = JSON.parse(await readFile('package.json', 'utf8'));
          const addonId = manifest.browser_specific_settings?.gecko?.id ?? manifest.applications?.gecko?.id;
          const version = manifest.version;
          if (!addonId || !version) {
            throw new Error('dist/manifest.json must include gecko.id and version.');
          }

          const authHeader = { Authorization: `JWT ${signJwt()}` };
          const versionUrl = `https://addons.mozilla.org/api/v5/addons/addon/${encodeURIComponent(addonId)}/versions/${encodeURIComponent(`v${version}`)}/`;
          const versionResponse = await fetch(versionUrl, { headers: authHeader });
          if (!versionResponse.ok) {
            throw new Error(`Failed to fetch AMO version metadata: ${versionResponse.status} ${await versionResponse.text()}`);
          }

          const amoVersion = await versionResponse.json();
          if (amoVersion.channel !== 'listed') {
            throw new Error(`Expected listed AMO version ${version}, got channel ${amoVersion.channel}.`);
          }
          if (!amoVersion.file?.url) {
            throw new Error(`AMO version ${version} does not include a downloadable file URL.`);
          }

          const xpiResponse = await fetch(amoVersion.file.url, { headers: authHeader });
          if (!xpiResponse.ok) {
            throw new Error(`Failed to download existing XPI: ${xpiResponse.status} ${await xpiResponse.text()}`);
          }

          const xpiBytes = Buffer.from(await xpiResponse.arrayBuffer());
          if (amoVersion.file.size && xpiBytes.length !== amoVersion.file.size) {
            throw new Error(`Downloaded XPI size mismatch: expected ${amoVersion.file.size}, got ${xpiBytes.length}.`);
          }
          if (xpiBytes[0] !== 0x50 || xpiBytes[1] !== 0x4b) {
            throw new Error('Downloaded AMO file is not a ZIP/XPI payload.');
          }

          await mkdir('web-ext-artifacts', { recursive: true });
          const safeName = `${packageJson.name}-${version}.xpi`.replace(/[^a-zA-Z0-9._-]/g, '_');
          const xpiPath = path.join('web-ext-artifacts', safeName);
          await writeFile(xpiPath, xpiBytes);
          console.log(`Downloaded existing signed XPI to ${xpiPath}`);
          NODE
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-xpi
          path: web-ext-artifacts/*.xpi
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - package
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-artifacts/*
          fail_on_unmatched_files: true
